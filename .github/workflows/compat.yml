name: compat probe

# Manually-triggered probe to find the real minimum Flutter/Dart the package
# compiles and tests on. Each matrix entry relaxes the pubspec constraints
# in-CI (so old SDKs can resolve) and runs the package test suite. The lowest
# green entry is the true floor — feed it back into pubspec `environment`.
on:
  workflow_dispatch:

jobs:
  probe:
    name: Flutter ${{ matrix.flutter }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flutter:
          - '3.10.6'   # Dart 3.0
          - '3.13.9'   # Dart 3.1
          - '3.16.9'   # Dart 3.2
          - '3.19.6'   # Dart 3.3
          - '3.22.3'   # Dart 3.4
          - '3.24.5'   # Dart 3.5
          - '3.27.4'   # Dart 3.6
          - '3.29.3'   # Dart 3.7
          - '3.32.0'   # Dart 3.8
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ matrix.flutter }}
      - name: relax constraints + dev tooling for the probe
        run: |
          # Only the 2-space-indented environment `sdk:`/`lints:` keys match;
          # the 4-space `    sdk: flutter` deps and `  flutter:` key are untouched.
          sed -i -E 's/^  sdk:.*/  sdk: ">=3.0.0 <4.0.0"/' pubspec.yaml
          sed -i -E 's/^  lints:.*/  lints: any/' pubspec.yaml
          rm -f analysis_options.yaml
          # `flutter pub get` auto-resolves example/, which pins its own
          # sdk: ^3.9.2 — irrelevant to probing the library, so drop it.
          rm -rf example
          echo "----- effective pubspec environment -----"
          grep -A3 '^environment:' pubspec.yaml
      - run: flutter --version
      - run: flutter pub get
      - run: flutter test
